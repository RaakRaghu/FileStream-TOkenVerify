<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-bl from-yellow-500 via-red-600 to-orange-500 text-white">

<div class="text-center mt-5">
    <h4>Download File</h4>
</div>

<div class="flex justify-center items-center min-h-[60vh]">
    <button onclick="smartDownload('%VIDEO_URL%')" 
    class="bg-black px-6 py-3 rounded-xl hover:bg-gradient-to-r from-pink-500 to-violet-500 transition">
        Download
    </button>
</div>

<script>
function smartDownload(url) {
    window.open(url, "_blank");
    setTimeout(() => {
        window.location.href = url;
    }, 1000);
}
</script>

</body>
</html>
