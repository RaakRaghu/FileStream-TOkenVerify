<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<div class="text-center p-3">
    <h5>Video Player</h5>
</div>

<div class="flex justify-center">
    <video controls class="w-full max-w-3xl border border-red-500">
        <source src="%VIDEO_URL%" type="video/mp4">
    </video>
</div>

<div class="text-center mt-4">
    <h4>Play with</h4>
</div>

<div class="flex flex-wrap justify-center gap-3 mt-3">
    <button onclick="vlc_player()" class="btn btn-dark">VLC</button>
    <button onclick="mx_player()" class="btn btn-dark">MX</button>
    <button onclick="playit_player()" class="btn btn-dark">Playit</button>
    <button onclick="km_player()" class="btn btn-dark">KM</button>
</div>

<script>
const videoUrl = "%VIDEO_URL%";

function isAndroid() {
    return /Android/i.test(navigator.userAgent);
}

function openPlayer(pkg) {
    if (isAndroid()) {
        const clean = videoUrl.replace(/^https?:\/\//, '');
        const intent = `intent://${clean}#Intent;package=${pkg};scheme=https;end`;
        window.location.href = intent;
    } else {
        window.location.href = videoUrl;
    }
}

function vlc_player() {
    openPlayer("org.videolan.vlc");
}

function mx_player() {
    openPlayer("com.mxtech.videoplayer.ad");
}

function playit_player() {
    openPlayer("com.playit.videoplayer");
}

function km_player() {
    openPlayer("com.kmplayer");
}
</script>

</body>
</html>
